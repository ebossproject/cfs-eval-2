services:
  cfs:
    image: cfs:latest
    build:
        context: .
        dockerfile: dockerfiles/cfs.dockerfile
        args:
          # Build-time ARG, can be overridden
          LOG_FILE: /var/tmp/cfs.log
    volumes:
      # Bind mount the host folder for logs
      - /var/tmp:/var/tmp
    container_name: cfs
    networks:
      - cfs-network
    ports:
      - "1234:1234"
      - "1235:1235"

  poller:
    image: poller:latest
    build:
        context: .
        dockerfile: poller/Dockerfile
    container_name: poller
    volumes:
      - /var/tmp:/var/tmp
    networks:
      - cfs-network
    # Other configuration options
    environment:
      TARGET: cfs

  pov1:
    image: pov:latest
    build:
        context: .
        dockerfile: pov/Dockerfile
    container_name: pov1
    volumes:
      - /var/tmp:/var/tmp
    networks:
      - cfs-network
    # Other configuration options
    environment:
      TARGET: cfs
    command: ["python3", "pov/pov1.py"]

  pov2:
    image: pov:latest
    build:
        context: .
        dockerfile: pov/Dockerfile
    container_name: pov2
    volumes:
      - /var/tmp:/var/tmp
    networks:
      - cfs-network
    # Other configuration options
    environment:
      TARGET: cfs
    command: ["python3", "pov/pov2.py"]

networks:
  cfs-network:
